#cloud-config
# ==============================================================================
# Cloud-Init Template: Automated Docker, Cloudflare & CISO Assistant Provisioning
# NOTE: @NOTIFICATION_EMAIL@, @GITHUB_REPO@, @GITHUB_TOKEN@ replaced by Terraform
# ==============================================================================

swap:
  filename: /swapfile
  size: 2147483648
  maxsize: 2147483648

package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose-v2
  - git
  - curl
  - python3
  - wget

write_files:

  - path: /usr/local/bin/update_status.py
    permissions: '0755'
    owner: 'root:root'
    content: |
      #!/usr/bin/env python3
      import sys
      import os
      import json
      import base64
      import urllib.request
      import re

      def get_cloudflare_url():
          log_path = '/var/log/cloudflared.log'
          if os.path.exists(log_path):
              try:
                  with open(log_path, 'r', encoding='utf-8', errors='ignore') as f:
                      content = f.read()
                  match = re.search(r'https://[a-z0-9-]+\.trycloudflare\.com', content)
                  if match:
                      return match.group(0)
              except Exception:
                  pass
          return None

      def main():
          if len(sys.argv) < 3:
              print('Usage: update_status.py <status> <message_or_log_file>')
              sys.exit(1)
          status = sys.argv[1]
          log_source = sys.argv[2]
          if os.path.exists(log_source):
              try:
                  with open(log_source, 'r', encoding='utf-8', errors='ignore') as f:
                      log_content = f.read()
              except Exception as e:
                  log_content = f'Error reading log file: {e}'
          else:
              log_content = log_source
          token = os.environ.get('GITHUB_TOKEN')
          repo = os.environ.get('GITHUB_REPO')
          if not token or not repo:
              print('Missing GITHUB_TOKEN or GITHUB_REPO env var')
              sys.exit(1)
          url = f'https://api.github.com/repos/{repo}/contents/setup_status.json'
          sha = None
          req = urllib.request.Request(url, headers={'Authorization': f'token {token}', 'Accept': 'application/vnd.github+json'})
          try:
              with urllib.request.urlopen(req) as response:
                  res_data = json.loads(response.read().decode())
                  sha = res_data.get('sha')
          except Exception:
              pass
          cf_url = get_cloudflare_url()
          payload_data = {'status': status, 'log': log_content}
          if cf_url:
              payload_data['cloudflare_url'] = cf_url
          content_bytes = json.dumps(payload_data).encode('utf-8')
          content_b64 = base64.b64encode(content_bytes).decode('utf-8')
          body = {'message': f'Setup status: {status}', 'content': content_b64}
          if sha:
              body['sha'] = sha
          req_put = urllib.request.Request(url, data=json.dumps(body).encode('utf-8'),
              headers={'Authorization': f'token {token}', 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json'},
              method='PUT')
          try:
              with urllib.request.urlopen(req_put) as response:
                  print(f'Status updated successfully: {status}')
          except Exception as e:
              print(f'Failed to update status: {e}')

      if __name__ == '__main__':
          main()

  - path: /usr/local/bin/install_ciso_tunnel.sh
    permissions: '0755'
    owner: 'root:root'
    content: |
      #!/bin/bash
      # Automatische Einrichtung des Cloudflare Quick Tunnels fuer CISO Assistant
      set -e

      echo '==> Starte Cloudflare Quick Tunnel Installation...'

      ARCH=$(dpkg --print-architecture)
      if [ "$ARCH" = "arm64" ]; then
          curl -L -s -o /tmp/cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64.deb
      else
          curl -L -s -o /tmp/cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
      fi
      dpkg -i /tmp/cloudflared.deb || apt-get install -f -y
      rm -f /tmp/cloudflared.deb

      # Erstelle leeres Logfile und setze Berechtigungen, damit systemd/cloudflared hineinschreiben koennen
      touch /var/log/cloudflared.log
      chmod 644 /var/log/cloudflared.log

      cat > /etc/systemd/system/cloudflared-quick.service << 'EOF'
      [Unit]
      Description=Cloudflare Quick Tunnel for CISO Assistant
      After=network.target

      [Service]
      Type=simple
      User=root
      ExecStart=/usr/local/bin/cloudflared tunnel --url https://localhost:8443 --no-tls-verify --no-autoupdate
      Restart=always
      RestartSec=5
      StandardOutput=append:/var/log/cloudflared.log
      StandardError=append:/var/log/cloudflared.log

      [Install]
      WantedBy=multi-user.target
      EOF

      systemctl daemon-reload
      systemctl enable cloudflared-quick.service
      systemctl start cloudflared-quick.service
      echo '==> Cloudflare Tunnel installiert und gestartet.'

  - path: /usr/local/bin/patch-ciso-compose.py
    permissions: '0755'
    owner: 'root:root'
    content: |
      #!/usr/bin/env python3
      import sys, os, re, json, shutil, subprocess
      from datetime import datetime
      AUDIT_LOG = "/var/log/ciso-onboarding/setup-audit.jsonl"
      COMPOSE_PATH = "/home/ubuntu/ciso-assistant/docker-compose.yml"

      def log_audit(entry):
          os.makedirs(os.path.dirname(AUDIT_LOG), exist_ok=True)
          with open(AUDIT_LOG, "a") as f:
              f.write(json.dumps(entry, default=str) + "\n")

      def patch(compose_path, public_url, public_host):
          with open(compose_path, "r") as f:
              old_content = f.read()
          content = old_content
          content = re.sub(r'(- ALLOWED_HOSTS=).*', rf'\g<1>backend,localhost,{public_host}', content)
          content = re.sub(r'(- CISO_ASSISTANT_URL=).*', rf'\g<1>{public_url}', content)
          content = re.sub(r'(- CSRF_TRUSTED_ORIGINS=).*', r'\g<1>https://trycloudflare.com,https://*.trycloudflare.com', content)
          content = re.sub(r'(- PUBLIC_BACKEND_API_EXPOSED_URL=).*', rf'\g<1>{public_url}/api', content)
          content = re.sub(r'(- ORIGIN=).*', rf'\g<1>{public_url}', content)
          content = re.sub(r'(localhost:443, )[a-z0-9-]+\.trycloudflare\.com(:443 \{)', rf'\g<1>{public_host}\g<2>', content)
          
          if old_content == content:
              print("Configuration is already up to date. No restart needed.")
              return

          ts = datetime.utcnow().strftime("%Y%m%d-%H%M%S")
          backup = f"/opt/ciso-setup-archive/{ts}/docker-compose.yml"
          os.makedirs(os.path.dirname(backup), exist_ok=True)
          shutil.copy2(compose_path, backup)
          
          with open(compose_path, "w") as f:
              f.write(content)
          try:
              r = subprocess.run(["docker", "compose", "config", "--quiet"],
                  cwd=os.path.dirname(compose_path), capture_output=True, timeout=30)
              valid = r.returncode == 0
          except Exception:
              valid = False
          if not valid:
              shutil.copy2(backup, compose_path)
              print("VALIDATION FAILED - backup restored")
              log_audit({"timestamp": datetime.utcnow().isoformat()+"Z", "step":"patch_ciso_compose","status":"failed","public_url":public_url})
              sys.exit(1)
          
          print("Validation OK. Applying changes via docker compose...")
          try:
              subprocess.run(["docker", "compose", "up", "-d"], cwd=os.path.dirname(compose_path), check=True)
              print("Docker containers successfully updated.")
              log_audit({"timestamp": datetime.utcnow().isoformat()+"Z", "step":"patch_ciso_compose","status":"success","public_url":public_url,"public_host":public_host,"backup_path":backup})
              
              # Trigger email notification if script exists
              mail_script = "/usr/local/bin/send-tunnel-url-mail.sh"
              if os.path.exists(mail_script):
                  print("Triggering email notification...")
                  subprocess.run([mail_script, public_url], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
          except Exception as e:
              print(f"Error applying changes: {e}")
              shutil.copy2(backup, compose_path)
              subprocess.run(["docker", "compose", "up", "-d"], cwd=os.path.dirname(compose_path))
              sys.exit(1)

      if __name__ == "__main__":
          url = sys.argv[1] if len(sys.argv) > 1 else None
          if not url:
              m = re.search(r'https://[a-z0-9-]+\.trycloudflare\.com', open("/var/log/cloudflared.log").read())
              url = m.group(0) if m else None
          if not url:
              print("No URL found"); sys.exit(1)
          host = url.replace("https://", "")
          patch(COMPOSE_PATH, url, host)

  - path: /usr/local/bin/get-cloudflare-tunnel-url.sh
    permissions: '0755'
    owner: 'root:root'
    content: |
      #!/bin/bash
      set -euo pipefail
      LOGFILE="${1:-/var/log/cloudflared.log}"
      TIMEOUT="${2:-30}"
      if [ ! -f "$LOGFILE" ]; then echo "ERROR: Logfile not found: $LOGFILE" >&2; exit 1; fi
      END=$((SECONDS + TIMEOUT))
      while [ $SECONDS -lt $END ]; do
        URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' "$LOGFILE" | tail -1)
        if [ -n "$URL" ]; then echo "$URL"; exit 0; fi
        sleep 2
      done
      echo "ERROR: No trycloudflare.com URL found after ${TIMEOUT}s" >&2
      exit 1

  - path: /usr/local/bin/backup-ciso-config.sh
    permissions: '0755'
    owner: 'root:root'
    content: |
      #!/bin/bash
      set -euo pipefail
      CISO_DIR="${CISO_DIR:-/home/ubuntu/ciso-assistant}"
      BACKUP_BASE="${BACKUP_BASE:-/opt/ciso-setup-archive}"
      TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
      BACKUP_DIR="${BACKUP_BASE}/${TIMESTAMP}"
      mkdir -p "$BACKUP_DIR"
      [ -f "$CISO_DIR/docker-compose.yml" ] && cp "$CISO_DIR/docker-compose.yml" "$BACKUP_DIR/"
      [ -d "$CISO_DIR/db/caddy" ] && cp -r "$CISO_DIR/db/caddy" "$BACKUP_DIR/"
      echo "$BACKUP_DIR"

runcmd:
  - |
    set -e
    CISO_DIR="/home/ubuntu/ciso-assistant"
    INSTALL_DIR="/home/ubuntu/ciso-installation"
    LOG="/var/log/cloud-init-ciso-setup.log"
    NOTIFICATION_EMAIL="@NOTIFICATION_EMAIL@"

    log() { echo "[$(date '+%H:%M:%S')] $*" | tee -a "$LOG"; }

    update_status() {
      GITHUB_TOKEN="@GITHUB_TOKEN@" GITHUB_REPO="@GITHUB_REPO@" python3 /usr/local/bin/update_status.py "$1" "$2" 2>>"$LOG" || true
    }

    log "=== Step 1: Enable Docker ==="
    update_status INITIALIZING "Enabling Docker service..."
    systemctl enable docker
    systemctl start docker
    usermod -aG docker ubuntu

    log "=== Step 2: Clone repositories ==="
    update_status CLONING "Cloning CISO Assistant and installation repo..."
    git clone https://github.com/intuitem/ciso-assistant-community.git "$CISO_DIR" 2>>"$LOG"
    git clone https://github.com/@GITHUB_REPO@.git "$INSTALL_DIR" 2>>"$LOG"

    log "=== Step 3: Copy GRC setup files ==="
    mkdir -p "$CISO_DIR/db"
    cp "$INSTALL_DIR"/*.py "$CISO_DIR/db/" 2>>"$LOG" || log "WARNING: no .py files found"
    cp "$INSTALL_DIR"/*.json "$CISO_DIR/db/" 2>>"$LOG" || log "WARNING: no .json files found"
    cp -r "$INSTALL_DIR/evidences" "$CISO_DIR/db/" 2>>"$LOG" || log "WARNING: no evidences folder"
    cp "$INSTALL_DIR"/scripts/send-tunnel-url-mail.sh /usr/local/bin/send-tunnel-url-mail.sh 2>>"$LOG" || log "WARNING: no mail script found"
    chmod 755 /usr/local/bin/send-tunnel-url-mail.sh 2>>"$LOG" || true
    chown -R ubuntu:ubuntu "$CISO_DIR" "$INSTALL_DIR"

    log "=== Step 4: Start Docker Compose ==="
    update_status DOCKER_PULL "Pulling Docker images..."
    cd "$CISO_DIR"
    docker compose pull 2>>"$LOG"
    docker compose up -d 2>>"$LOG"
    log "Docker containers started."

    log "=== Step 5: Wait for CISO Assistant API ==="
    update_status WAITING_FOR_API "Waiting for CISO Assistant API (up to 5 minutes)..."
    API_READY=0
    for i in $(seq 1 30); do
      if curl -k -s --max-time 5 https://localhost:8443/api/health/ | grep -q "ok"; then
        log "API healthy after $i attempts."
        API_READY=1
        break
      fi
      log "  Waiting... attempt $i/30"
      sleep 10
    done

    if [ "$API_READY" -eq 0 ]; then
      log "ERROR: API did not become healthy after 300s."
      docker ps 2>>"$LOG"
      docker compose logs --tail=50 2>>"$LOG"
      update_status FAILED "$LOG"
      exit 1
    fi

    log "=== Step 6: Seed GRC database ==="
    update_status SEEDING "Seeding GRC database..."
    sleep 5
    docker compose exec -T backend python db/grc_setup.py 2>>"$LOG" || log "grc_setup failed"
    docker compose exec -T backend python db/import_m365_assess.py 2>>"$LOG" || log "import_m365_assess failed"
    docker compose exec -T backend python db/grc_setup_m365_deconstruction.py 2>>"$LOG" || log "grc_setup_m365 failed"
    docker compose exec -T backend python db/grc_setup_metrology.py 2>>"$LOG" || log "grc_setup_metrology failed"
    docker compose exec -T backend python db/grc_link_all_frameworks.py 2>>"$LOG" || log "grc_link_all_frameworks failed"
    docker compose exec -T backend python db/import_m365_findings.py 2>>"$LOG" || log "import_m365_findings failed"
    docker compose exec -T backend python db/grc_profile_setup.py --profile sme 2>>"$LOG" || log "grc_profile_setup failed"
    docker compose exec -T backend python db/populate_privacy_custom.py 2>>"$LOG" || log "populate_privacy_custom failed"

    log "=== Step 7: Install Cloudflare Tunnel ==="
    update_status CLOUDFLARE "Installing Cloudflare Tunnel..."
    bash /usr/local/bin/install_ciso_tunnel.sh 2>>"$LOG"
    log "Cloudflare Tunnel installed."

    log "=== Step 8: Configure URL-Sync ==="
    update_status URL_SYNC "Deploying URL sync..."
    mkdir -p /var/log/ciso-onboarding /opt/ciso-setup-archive
    chown -R ubuntu:ubuntu /var/log/ciso-onboarding /opt/ciso-setup-archive
    chmod 775 /var/log/ciso-onboarding /opt/ciso-setup-archive

    cat > /etc/systemd/system/ciso-tunnel-url-sync.service << 'SYNCSEOF'
    [Unit]
    Description=CISO Assistant Cloudflare Tunnel URL Sync
    After=docker.service cloudflared.service
    Requires=docker.service cloudflared.service

    [Service]
    Type=oneshot
    User=root
    ExecStartPre=/bin/bash -c "su - ubuntu -c 'cd /home/ubuntu/ciso-installation && git pull' && cp /home/ubuntu/ciso-installation/scripts/send-tunnel-url-mail.sh /usr/local/bin/send-tunnel-url-mail.sh && chmod 755 /usr/local/bin/send-tunnel-url-mail.sh"
    ExecStart=/usr/local/bin/patch-ciso-compose.py
    ExecStartPost=/bin/chown -R ubuntu:ubuntu /var/log/ciso-onboarding /opt/ciso-setup-archive /home/ubuntu/ciso-assistant
    StandardOutput=file:/var/log/ciso-onboarding/cloudflare-url-sync.log
    StandardError=file:/var/log/ciso-onboarding/cloudflare-url-sync.log
    SYNCSEOF

    cat > /etc/systemd/system/ciso-tunnel-url-sync.timer << 'TIMOREOF'
    [Unit]
    Description=Check Cloudflare Tunnel URL every 5 minutes

    [Timer]
    OnBootSec=2min
    OnUnitActiveSec=5min
    Persistent=true

    [Install]
    WantedBy=timers.target
    TIMOREOF

    systemctl daemon-reload
    systemctl enable ciso-tunnel-url-sync.timer
    systemctl start ciso-tunnel-url-sync.timer
    log "URL-Sync timer installed"

    log "=== Step 9: Configure Mail ==="
    if [ -n "$NOTIFICATION_EMAIL" ]; then
      update_status MAIL "Configuring mail..."
      mkdir -p /etc/ciso-onboarding
      
      # Query OCI IMDS dynamically for credentials to keep user_data static and prevent VM recreation on key rotation
      SMTP_USER=$(curl -H "Authorization: Bearer Oracle" -s http://169.254.169.254/opc/v2/instance/metadata/smtp_user || true)
      SMTP_PASSWORD=$(curl -H "Authorization: Bearer Oracle" -s http://169.254.169.254/opc/v2/instance/metadata/smtp_password || true)
      OCI_REGION=$(curl -H "Authorization: Bearer Oracle" -s http://169.254.169.254/opc/v2/instance/region || true)
      if [ -z "$OCI_REGION" ]; then OCI_REGION="eu-frankfurt-1"; fi
      
      echo "SMTP_SERVER=smtp.email.${OCI_REGION}.oci.oraclecloud.com" > /etc/ciso-onboarding/mail.env
      echo "SMTP_PORT=587" >> /etc/ciso-onboarding/mail.env
      echo "SMTP_AUTH_USER=${SMTP_USER}" >> /etc/ciso-onboarding/mail.env
      echo "SMTP_AUTH_PASSWORD=${SMTP_PASSWORD}" >> /etc/ciso-onboarding/mail.env
      echo "MAIL_FROM=$NOTIFICATION_EMAIL" >> /etc/ciso-onboarding/mail.env
      echo "MAIL_TO=$NOTIFICATION_EMAIL" >> /etc/ciso-onboarding/mail.env
      chmod 600 /etc/ciso-onboarding/mail.env
      chown root:root /etc/ciso-onboarding/mail.env
    fi

    log "=== Setup COMPLETED ==="
    update_status COMPLETED "$LOG"

log:
  output: '/var/log/cloud-init-ciso-setup.log'
