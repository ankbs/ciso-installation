#cloud-config
# ==============================================================================
# Cloud-Init Template: Automated Docker, Cloudflare & CISO Assistant Provisioning
# Target OS: Ubuntu 22.04 LTS / 24.04 LTS (Oracle Cloud VM)
# ==============================================================================

# Configure 2GB Swap Space to support 1GB RAM on AMD micro shapes
swap:
  filename: /swapfile
  size: 2147483648
  maxsize: 2147483648

package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose-v2
  - git
  - curl
  - python3

runcmd:
  # All steps run as root via cloud-init. Docker is run with full path.
  - |
    set -e
    CISO_DIR="/home/ubuntu/ciso-assistant"
    INSTALL_DIR="/home/ubuntu/ciso-installation"
    LOG="/var/log/cloud-init-ciso-setup.log"
    NOTIFICATION_EMAIL="${notification_email}"

    log() { echo "[$(date '+%H:%M:%S')] $*" | tee -a "$LOG"; }

    log "=== Step 0: Write status helper script ==="
    cat > /home/ubuntu/update_status.py << 'PYEOF'
import sys
import os
import json
import base64
import urllib.request
import re

def get_cloudflare_url():
    log_path = '/var/log/cloudflared.log'
    if os.path.exists(log_path):
        try:
            with open(log_path, 'r', encoding='utf-8', errors='ignore') as f:
                content = f.read()
            match = re.search(r'https://[a-z0-9-]+\.trycloudflare\.com', content)
            if match:
                return match.group(0)
        except Exception:
            pass
    return None

def main():
    if len(sys.argv) < 3:
        print('Usage: update_status.py <status> <message_or_log_file>')
        sys.exit(1)
    status = sys.argv[1]
    log_source = sys.argv[2]

    if os.path.exists(log_source):
        try:
            with open(log_source, 'r', encoding='utf-8', errors='ignore') as f:
                log_content = f.read()
        except Exception as e:
            log_content = f'Error reading log file: {e}'
    else:
        log_content = log_source

    token = os.environ.get('GITHUB_TOKEN')
    repo = os.environ.get('GITHUB_REPO')
    if not token or not repo:
        print('Missing GITHUB_TOKEN or GITHUB_REPO env var')
        sys.exit(1)

    url = f'https://api.github.com/repos/{repo}/contents/setup_status.json'

    # Get SHA if file exists to overwrite it
    sha = None
    req = urllib.request.Request(url, headers={'Authorization': f'token {token}', 'Accept': 'application/vnd.github+json'})
    try:
        with urllib.request.urlopen(req) as response:
            res_data = json.loads(response.read().decode())
            sha = res_data.get('sha')
    except Exception:
        pass

    cf_url = get_cloudflare_url()
    payload_data = {
        'status': status,
        'log': log_content
    }
    if cf_url:
        payload_data['cloudflare_url'] = cf_url

    content_bytes = json.dumps(payload_data).encode('utf-8')
    content_b64 = base64.b64encode(content_bytes).decode('utf-8')

    body = {
        'message': f'Setup status: {status}',
        'content': content_b64
    }
    if sha:
        body['sha'] = sha

    req_put = urllib.request.Request(url, data=json.dumps(body).encode('utf-8'),
        headers={
            'Authorization': f'token {token}',
            'Accept': 'application/vnd.github+json',
            'Content-Type': 'application/json'
        },
        method='PUT')
    try:
        with urllib.request.urlopen(req_put) as response:
            print(f'Status updated successfully: {status}')
    except Exception as e:
        print(f'Failed to update status: {e}')

if __name__ == '__main__':
    main()
PYEOF
    chown ubuntu:ubuntu /home/ubuntu/update_status.py
    chmod 755 /home/ubuntu/update_status.py

    update_status() {
      GITHUB_TOKEN="${github_token}" GITHUB_REPO="${github_repo}" python3 /home/ubuntu/update_status.py "$1" "$2" 2>>"$LOG" || true
    }

    log "=== Step 1: Enable Docker ==="
    update_status INITIALIZING "Enabling Docker service..."
    systemctl enable docker
    systemctl start docker
    usermod -aG docker ubuntu

    log "=== Step 2: Clone repositories ==="
    update_status CLONING "Cloning CISO Assistant and installation repo..."
    git clone https://github.com/intuitem/ciso-assistant-community.git "$CISO_DIR" 2>>"$LOG"
    git clone https://github.com/${github_repo}.git "$INSTALL_DIR" 2>>"$LOG"

    log "=== Step 3: Copy GRC setup files ==="
    mkdir -p "$CISO_DIR/db"
    cp "$INSTALL_DIR"/*.py "$CISO_DIR/db/" 2>>"$LOG" || log "WARNING: no .py files found"
    cp "$INSTALL_DIR"/*.json "$CISO_DIR/db/" 2>>"$LOG" || log "WARNING: no .json files found"
    cp -r "$INSTALL_DIR/evidences" "$CISO_DIR/db/" 2>>"$LOG" || log "WARNING: no evidences folder"
    chown -R ubuntu:ubuntu "$CISO_DIR" "$INSTALL_DIR"

    log "=== Step 4: Start Docker Compose ==="
    update_status DOCKER_PULL "Pulling Docker images..."
    cd "$CISO_DIR"
    docker compose pull 2>>"$LOG"
    docker compose up -d 2>>"$LOG"
    log "Docker containers started."

    log "=== Step 5: Wait for CISO Assistant API to become healthy ==="
    update_status WAITING_FOR_API "Waiting for CISO Assistant API (up to 5 minutes)..."
    API_READY=0
    for i in $(seq 1 30); do
      if curl -k -s --max-time 5 https://localhost:8443/api/health/ | grep -q "ok"; then
        log "API healthy on https://localhost:8443 after $i attempts."
        API_READY=1
        break
      fi
      log "  Waiting... attempt $i/30"
      sleep 10
    done

    if [ "$API_READY" -eq 0 ]; then
      log "ERROR: API did not become healthy after 300s."
      log "--- Docker ps ---"
      docker ps 2>>"$LOG"
      log "--- Docker compose logs (last 50) ---"
      docker compose logs --tail=50 2>>"$LOG"
      update_status FAILED "$LOG"
      exit 1
    fi

    log "=== Step 6: Seed GRC database ==="
    update_status SEEDING "Seeding GRC database (this takes several minutes)..."
    sleep 5
    docker compose exec -T backend python db/grc_setup.py                    2>>"$LOG" || log "grc_setup failed (non-fatal)"
    docker compose exec -T backend python db/import_m365_assess.py           2>>"$LOG" || log "import_m365_assess failed"
    docker compose exec -T backend python db/grc_setup_m365_deconstruction.py 2>>"$LOG" || log "grc_setup_m365 failed"
    docker compose exec -T backend python db/grc_setup_metrology.py          2>>"$LOG" || log "grc_setup_metrology failed"
    docker compose exec -T backend python db/grc_link_all_frameworks.py      2>>"$LOG" || log "grc_link_all_frameworks failed"
    docker compose exec -T backend python db/import_m365_findings.py         2>>"$LOG" || log "import_m365_findings failed"
    docker compose exec -T backend python db/grc_profile_setup.py --profile sme 2>>"$LOG" || log "grc_profile_setup failed"
    docker compose exec -T backend python db/populate_privacy_custom.py      2>>"$LOG" || log "populate_privacy_custom failed"

    log "=== Step 7: Install and configure Cloudflare Tunnel ==="
    update_status CLOUDFLARE "Installing Cloudflare Tunnel with logfile..."
    ARCH=$(dpkg --print-architecture)
    curl -L --output /usr/local/bin/cloudflared "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-$ARCH" 2>>"$LOG"
    chmod +x /usr/local/bin/cloudflared

    # Write cloudflared service with logfile support
    cat > /etc/systemd/system/cloudflared.service << 'SERVICEEOF'
[Unit]
Description=Cloudflare Tunnel Quick Tunnel
After=network.target

[Service]
Type=simple
User=root
ExecStart=/usr/local/bin/cloudflared tunnel --url https://localhost:8443 --no-tls-verify --no-autoupdate --logfile /var/log/cloudflared.log
Restart=always
RestartSec=5
StandardOutput=file:/var/log/cloudflared.log
StandardError=file:/var/log/cloudflared.log

[Install]
WantedBy=multi-user.target
SERVICEEOF

    systemctl daemon-reload
    systemctl enable cloudflared
    systemctl start cloudflared
    # cloudflared.log wird von systemd erstellt (root:root) – ubuntu lesbar machen
    touch /var/log/cloudflared.log
    chown root:ubuntu /var/log/cloudflared.log
    chmod 640 /var/log/cloudflared.log
    log "Cloudflare Tunnel service started with logfile support."

    log "=== Step 8: Deploy URL-Sync scripts ==="
    update_status URL_SYNC "Deploying URL sync scripts..."
    
    # Create log directory (root:ubuntu damit Admin lesen kann)
    mkdir -p /var/log/ciso-onboarding
    chown root:ubuntu /var/log/ciso-onboarding
    chmod 755 /var/log/ciso-onboarding

    # Helper: get-cloudflare-tunnel-url.sh
    cat > /usr/local/bin/get-cloudflare-tunnel-url.sh << 'SHSCRIPT'
#!/bin/bash
set -euo pipefail
LOGFILE="${1:-/var/log/cloudflared.log}"
TIMEOUT="${2:-30}"
if [ ! -f "$LOGFILE" ]; then echo "ERROR: Logfile not found: $LOGFILE" >&2; exit 1; fi
END=$((SECONDS + TIMEOUT))
while [ $SECONDS -lt $END ]; do
  URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' "$LOGFILE" | tail -1)
  if [ -n "$URL" ]; then echo "$URL"; exit 0; fi
  sleep 2
done
echo "ERROR: No trycloudflare.com URL found after ${TIMEOUT}s" >&2
exit 1
SHSCRIPT
    chmod 755 /usr/local/bin/get-cloudflare-tunnel-url.sh

    # Helper: test-ciso-health.sh
    cat > /usr/local/bin/test-ciso-health.sh << 'SHSCRIPT2'
#!/bin/bash
set -euo pipefail
LOCAL_URL="${1:-https://localhost:8443}"
PUBLIC_URL="${2:-}"
TIMEOUT="${3:-10}"
log() { echo "[$(date '+%H:%M:%S')] $*"; }
fail() { log "FAILED: $*"; exit 1; }
log "Checking local health: $LOCAL_URL/api/health/"
LOCAL_RESULT=$(curl -k -s --max-time "$TIMEOUT" "$LOCAL_URL/api/health/" 2>&1) || true
echo "$LOCAL_RESULT" | grep -q '"status":"ok"' && log "  [+] Local health: OK" || fail "Local health: $LOCAL_RESULT"
LOCAL_WEB=$(curl -k -s -o /dev/null -w "%{http_code}" --max-time "$TIMEOUT" "$LOCAL_URL" 2>&1) || true
[ "$LOCAL_WEB" = "302" ] || [ "$LOCAL_WEB" = "200" ] && log "  [+] Local web: HTTP $LOCAL_WEB" || fail "Local web: HTTP $LOCAL_WEB"
if [ -n "$PUBLIC_URL" ]; then
  log "Checking public health: $PUBLIC_URL/api/health/"
  PUBLIC_RESULT=$(curl -s --max-time "$TIMEOUT" "$PUBLIC_URL/api/health/" 2>&1) || true
  echo "$PUBLIC_RESULT" | grep -q '"status":"ok"' && log "  [+] Public health: OK" || fail "Public health: $PUBLIC_RESULT"
  PUBLIC_WEB=$(curl -s -o /dev/null -w "%{http_code}" --max-time "$TIMEOUT" "$PUBLIC_URL" 2>&1) || true
  [ "$PUBLIC_WEB" = "302" ] || [ "$PUBLIC_WEB" = "200" ] && log "  [+] Public web: HTTP $PUBLIC_WEB" || fail "Public web: HTTP $PUBLIC_WEB"
fi
log "All health checks passed."
SHSCRIPT2
    chmod 755 /usr/local/bin/test-ciso-health.sh

    # Helper: backup-ciso-config.sh
    cat > /usr/local/bin/backup-ciso-config.sh << 'SHSCRIPT3'
#!/bin/bash
set -euo pipefail
CISO_DIR="${CISO_DIR:-/home/ubuntu/ciso-assistant}"
BACKUP_BASE="${BACKUP_BASE:-/opt/ciso-setup-archive}"
TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
BACKUP_DIR="${BACKUP_BASE}/${TIMESTAMP}"
mkdir -p "$BACKUP_DIR"
[ -f "$CISO_DIR/docker-compose.yml" ] && cp "$CISO_DIR/docker-compose.yml" "$BACKUP_DIR/"
[ -d "$CISO_DIR/db/caddy" ] && cp -r "$CISO_DIR/db/caddy" "$BACKUP_DIR/"
echo "$BACKUP_DIR"
SHSCRIPT3
    chmod 755 /usr/local/bin/backup-ciso-config.sh

    # Helper: patch-ciso-compose.py
    cat > /usr/local/bin/patch-ciso-compose.py << 'PYEOF2'
#!/usr/bin/env python3
import sys, os, re, json, shutil, subprocess
from datetime import datetime
AUDIT_LOG = "/var/log/ciso-onboarding/setup-audit.jsonl"
COMPOSE_PATH = "/home/ubuntu/ciso-assistant/docker-compose.yml"

def log_audit(entry):
    os.makedirs(os.path.dirname(AUDIT_LOG), exist_ok=True)
    with open(AUDIT_LOG, "a") as f:
        f.write(json.dumps(entry, default=str) + "\n")

def patch(compose_path, public_url, public_host):
    with open(compose_path, "r") as f:
        content = f.read()
    ts = datetime.utcnow().strftime("%Y%m%d-%H%M%S")
    backup = f"/opt/ciso-setup-archive/{ts}/docker-compose.yml"
    os.makedirs(os.path.dirname(backup), exist_ok=True)
    shutil.copy2(compose_path, backup)

    # Backend
    content = re.sub(
        r'(- ALLOWED_HOSTS=).*',
        rf'\g<1>backend,localhost,{public_host}',
        content
    )
    content = re.sub(
        r'(- CISO_ASSISTANT_URL=).*',
        rf'\g<1>{public_url}',
        content
    )
    content = re.sub(
        r'(- CSRF_TRUSTED_ORIGINS=).*',
        r'\g<1>https://trycloudflare.com,https://*.trycloudflare.com',
        content
    )
    # Huey (ALLOWED_HOSTS + CISO_ASSISTANT_URL only)
    # These are already handled by the same patterns above since they use same env var names

    # Frontend
    content = re.sub(
        r'(- PUBLIC_BACKEND_API_EXPOSED_URL=).*',
        rf'\g<1>{public_url}/api',
        content
    )
    content = re.sub(
        r'(- ORIGIN=).*',
        rf'\g<1>{public_url}',
        content
    )

    # Caddy command block - replace the entire Caddyfile content
    caddy_pattern = r'(localhost:443, )[a-z0-9-]+\.trycloudflare\.com(:443 \{)'
    content = re.sub(caddy_pattern, rf'\g<1>{public_host}\g<2>', content)

    with open(compose_path, "w") as f:
        f.write(content)

    # Validate
    try:
        r = subprocess.run(["docker", "compose", "config", "--quiet"],
            cwd=os.path.dirname(compose_path), capture_output=True, timeout=30)
        valid = r.returncode == 0
    except Exception:
        valid = False
    if not valid:
        shutil.copy2(backup, compose_path)
        print("VALIDATION FAILED - backup restored")
        log_audit({"timestamp": datetime.utcnow().isoformat()+"Z", "step":"patch_ciso_compose","status":"failed","public_url":public_url})
        sys.exit(1)
    print("Validation OK")
    log_audit({"timestamp": datetime.utcnow().isoformat()+"Z", "step":"patch_ciso_compose","status":"success","public_url":public_url,"public_host":public_host,"backup_path":backup})

if __name__ == "__main__":
    url = sys.argv[1] if len(sys.argv) > 1 else None
    if not url:
        m = re.search(r'https://[a-z0-9-]+\.trycloudflare\.com', open("/var/log/cloudflared.log").read())
        url = m.group(0) if m else None
    if not url:
        print("No URL found"); sys.exit(1)
    host = url.replace("https://", "")
    patch(COMPOSE_PATH, url, host)
PYEOF2
    chmod 755 /usr/local/bin/patch-ciso-compose.py

    log "  [+] URL sync scripts deployed to /usr/local/bin/"

    log "=== Step 9: Configure Mail (if NOTIFICATION_EMAIL provided) ==="
    if [ -n "$NOTIFICATION_EMAIL" ]; then
        update_status MAIL "Configuring mail notification for ${NOTIFICATION_EMAIL}..."
        mkdir -p /etc/ciso-onboarding
        cat > /etc/ciso-onboarding/mail.env << MAILEOF
# CISO Assistant Mail Configuration
# NOTE: SMTP credentials must be configured manually after setup
SMTP_SERVER=smtp.email.eu-frankfurt-1.oci.oraclecloud.com
SMTP_PORT=587
SMTP_AUTH_USER=
SMTP_AUTH_PASSWORD=
MAIL_FROM=${NOTIFICATION_EMAIL}
MAIL_TO=${NOTIFICATION_EMAIL}
MAILEOF
        chmod 600 /etc/ciso-onboarding/mail.env
        chown root:root /etc/ciso-onboarding/mail.env
        log "  [+] mail.env created for ${NOTIFICATION_EMAIL}"
    else
        log "  [-] No NOTIFICATION_EMAIL provided, skipping mail config."
    fi

    log "=== Step 10: Install URL-Sync Timer ==="
    cat > /etc/systemd/system/ciso-tunnel-url-sync.service << 'SERVICEEOF2'
[Unit]
Description=CISO Assistant Cloudflare Tunnel URL Sync
After=docker.service cloudflared.service
Requires=docker.service cloudflared.service

[Service]
Type=oneshot
User=root
ExecStart=/usr/local/bin/patch-ciso-compose.py
StandardOutput=file:/var/log/ciso-onboarding/cloudflare-url-sync.log
StandardError=file:/var/log/ciso-onboarding/cloudflare-url-sync.log
SERVICEEOF2

    cat > /etc/systemd/system/ciso-tunnel-url-sync.timer << 'TIMEREOF'
[Unit]
Description=Check Cloudflare Tunnel URL every 5 minutes

[Timer]
OnBootSec=2min
OnUnitActiveSec=5min
Persistent=true

[Install]
WantedBy=timers.target
TIMEREOF

    systemctl daemon-reload
    systemctl enable ciso-tunnel-url-sync.timer
    systemctl start ciso-tunnel-url-sync.timer
    log "  [+] URL-Sync timer installed (every 5 min)"

    log "=== Setup COMPLETED successfully ==="
    update_status COMPLETED "$LOG"

    # Send initial mail if email configured and URL available
    if [ -n "$NOTIFICATION_EMAIL" ]; then
        CF_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' /var/log/cloudflared.log | tail -1)
        if [ -n "$CF_URL" ] && command -v curl &>/dev/null; then
            log "Sending initial notification mail..."
            cat > /tmp/ciso-welcome-mail.txt << MAILBODY
From: ${NOTIFICATION_EMAIL}
To: ${NOTIFICATION_EMAIL}
Subject: CISO Assistant - Tunnel URL

Deine CISO Assistant Instanz ist bereit:

  ${CF_URL}

Bei jeder Aenderung der Tunnel-URL erhaeltst du eine neue Benachrichtigung.
MAILBODY
            log "  [+] Welcome mail prepared (SMTP not configured for auto-send)"
            log "  [+] Cloudflare URL: ${CF_URL}"
        fi
    fi

log:
  output: '/var/log/cloud-init-ciso-setup.log'