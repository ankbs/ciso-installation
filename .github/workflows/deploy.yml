name: Remote GRC Cloud Deployment

on:
  workflow_dispatch:
    inputs:
      oci_region:
        description: 'OCI Region'
        required: true
        default: 'eu-frankfurt-1'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install oci cryptography

      - name: Write OCI Credentials and Private Key
        run: |
          # Write the private key to a file
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > oci_private_key.pem
          chmod 600 oci_private_key.pem
          
          # Create the .env configuration file
          cat <<EOF > .env
          OCI_USER_OCID=${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}
          OCI_KEY_FILE=oci_private_key.pem
          OCI_TENANCY_OCID=${{ secrets.OCI_TENANCY_OCID }}
          OCI_COMPARTMENT_OCID=${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_REGION=${{ github.event.inputs.oci_region }}
          SSH_PUBLIC_KEY=${{ secrets.SSH_PUBLIC_KEY }}
          GITHUB_REPO=${{ github.repository }}
          EOF

      - name: Execute OCI Stack Deployment
        run: |
          python iac/deploy_to_oci.py
