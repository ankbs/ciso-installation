name: Remote GRC Cloud Deployment

on:
  workflow_dispatch:
    inputs:
      oci_region:
        description: 'OCI Region'
        required: true
        default: 'eu-frankfurt-1'
      notification_email:
        description: 'Email for tunnel URL notifications'
        required: false
        default: ''
      deployment_mode:
        description: 'Deployment Strategy / Action'
        required: true
        default: 'free_fallback'

permissions:
  contents: write

env:
  NOTIFICATION_EMAIL: ${{ github.event.inputs.notification_email }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install oci cryptography pynacl

      - name: Write OCI Credentials and Private Key
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > oci_private_key.pem
          chmod 600 oci_private_key.pem
          cat <<EOF > .env
          OCI_USER_OCID=${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}
          OCI_KEY_FILE=oci_private_key.pem
          OCI_TENANCY_OCID=${{ secrets.OCI_TENANCY_OCID }}
          OCI_COMPARTMENT_OCID=${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_REGION=${{ github.event.inputs.oci_region }}
          SSH_PUBLIC_KEY=${{ secrets.SSH_PUBLIC_KEY }}
          GITHUB_REPO=${{ github.repository }}
          GITHUB_TOKEN=${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          NOTIFICATION_EMAIL=${{ github.event.inputs.notification_email }}
          DEPLOYMENT_MODE=${{ github.event.inputs.deployment_mode }}
          EXISTING_SMTP_USER=${{ secrets.OCI_SMTP_USER }}
          EXISTING_SMTP_PASSWORD=${{ secrets.OCI_SMTP_PASSWORD }}
          EOF

      - name: Execute OCI Stack Deployment
        run: |
          python iac/deploy_to_oci.py
